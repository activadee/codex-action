name: Codex trigger-based review
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled, assigned]

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      structured_output: ${{ steps.run_codex.outputs.structured-output }}
      usage_json: ${{ steps.run_codex.outputs.usage-json }}
      triggered: ${{ steps.run_codex.outputs.triggered }}
    steps:
      - uses: actions/checkout@v5

      - name: Run Codex on trigger
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          trigger-phrase: "@codex"
          label-trigger: "codex"
          assignee-trigger: "codex-bot"
          track-progress: true
          use-sticky-comment: true
          sanitize-github-context: true
          capture-json-events: true
          write-step-summary: true
          prompt: |
            Review the request context and provide concise, actionable feedback.
            If this is a pull request, focus on correctness, regressions, and security risks.
